name: Deploy Marp Slides to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Marp Slides
        uses: docker://marpteam/marp-cli:latest
        with:
          args: ryanhill_pinterest_presentation.md -o dist/index.html --html --allow-local-files

      - name: Copy Images and CSS
        run: |
          mkdir -p dist/images
          cp -r images/* dist/images/
          cp *.css dist/

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4